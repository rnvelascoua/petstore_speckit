services:
  # ── Backend (Docker) ─────────────────────────────────────────────────────────
  - type: web
    name: petstore-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      # Set these manually in the Render dashboard after creating your PostgreSQL
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_NAME
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://petstore-frontend.onrender.com
      - key: PORT
        value: "8080"

  # ── Frontend (Static) ────────────────────────────────────────────────────────
  - type: web
    name: petstore-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://petstore-backend.onrender.com
