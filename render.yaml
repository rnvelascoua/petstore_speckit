services:
  # ── Backend (Docker) ─────────────────────────────────────────────────────────
  - type: web
    name: petstore-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: petstore-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: https://petstore-frontend.onrender.com
      - key: PORT
        value: "8080"

  # ── Frontend (Static) ────────────────────────────────────────────────────────
  - type: web
    name: petstore-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    plan: free
    envVars:
      - key: VITE_API_BASE_URL
        value: https://petstore-backend.onrender.com

databases:
  - name: petstore-db
    plan: free
    databaseName: petstore
