services:
  # ── Backend ─────────────────────────────────────────────────────────────────
  - type: web
    name: petstore-backend
    runtime: java
    plan: free
    buildCommand: cd backend && mvn clean package -DskipTests
    startCommand: java -jar backend/target/petstore-backend-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: petstore-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: https://petstore-frontend.onrender.com
      - key: PORT
        value: "8080"

  # ── Frontend ─────────────────────────────────────────────────────────────────
  - type: web
    name: petstore-frontend
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://petstore-backend.onrender.com

databases:
  - name: petstore-db
    plan: free
    databaseName: petstore
